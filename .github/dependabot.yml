version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    schedule:
      interval: 'weekly'
  - package-ecosystem: 'github-actions'
    directory: '/'
    groups:
      github-actions:
        patterns:
          - '*'
    schedule:
      interval: 'weekly'
